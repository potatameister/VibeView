name: VibeView Build and Artifacts

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Release APK
        run: ./gradlew assembleRelease --no-daemon

      - name: Sign APK
        uses: r0adkll/sign-android-release@v1
        id: sign_app
        with:
          releaseDirectory: app/build/outputs/apk/release
          signingKeyBase64: ${{ secrets.SIGNING_KEY }}
          alias: ${{ secrets.ALIAS }}
          keyStorePassword: ${{ secrets.KEY_STORE_PASSWORD }}
          keyPassword: ${{ secrets.KEY_PASSWORD }}

      - name: Upload Signed APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: vibeview-release-signed
          path: ${{ steps.sign_app.outputs.signedReleaseFile }}

      - name: Upload Unsigned Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: vibeview-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk

  build-rust:
    name: Build Rust Watcher
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          profile: minimal
          override: true

      - name: Build vibe-watch (x86_64 for testing)
        run: cd vibe-watch && cargo build --release

      - name: Upload Watcher Artifact
        uses: actions/upload-artifact@v4
        with:
          name: vibe-watch-bin
          path: vibe-watch/target/release/vibe-watch
